<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h1>My Blog</h1>
<a class="new-btn" href="{{ url_for('write') }}">+ 새 글쓰기</a>

<ul class="post-list">
    {% for post in posts %}
    <li>
        <a href="{{ url_for('post', post_id=post['id']) }}">{{ post['title'] }}</a>
        <span class="date">{{ post['created_at'] }}</span>
    </li>
    {% else %}
    <p>아직 글이 없어요. 첫 글을 남겨보세요!</p>
    {% endfor %}
</ul>
</body>
</html>
